<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Моя сказка</title>
    <style>
        body {
            background-color: #FFF8DC;
            font-family: 'Georgia', serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <h1>📖 Байки</h1>
    <!-- Весь текст из README.md будет показан здесь -->
    <div id="content"></div>
    
    <script>
        // Загружаем содержимое README.md
        fetch('README.md')
            .then(response => response.text())
            .then(text => {
                document.getElementById('content').innerHTML = text;
            });
    </script>
</body>
</html>
